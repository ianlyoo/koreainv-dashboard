<!DOCTYPE html>
<!-- saved from url=(0022)http://localhost:8000/ -->
<html lang="ko">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="http://localhost:8000/img/fa82e0f8872e03ff459435036237a46d.ico">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- TradingView -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <!-- TradingView Lightweight Charts (for KOR/JPN fallback) -->
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            /* Premium Dark Theme Palette */
            --bg-base: #050507;
            --bg-grad-1: #0a0b10;
            --bg-grad-2: #12141d;

            /* Glassmorphism Panels */
            --panel-bg: rgba(22, 24, 32, 0.65);
            --panel-border: rgba(255, 255, 255, 0.06);
            --panel-hover: rgba(30, 33, 43, 0.8);

            /* Typography */
            --text-main: #f3f4f6;
            --text-sub: #9ca3af;
            --text-muted: #6b7280;

            /* Accents */
            --accent-gold: #fbbf24;
            --accent-gold-hover: #f59e0b;
            --accent-blue: #3b82f6;

            /* Finance Colors */
            --profit: #10b981;
            /* Premium Green */
            --profit-bg: rgba(16, 185, 129, 0.1);
            --loss: #ef4444;
            /* Premium Red */
            --loss-bg: rgba(239, 68, 68, 0.1);

            /* Badges */
            --badge-kor: rgba(59, 130, 246, 0.15);
            --badge-kor-text: #60a5fa;
            --badge-usa: rgba(244, 63, 94, 0.15);
            --badge-usa-text: #fb7185;
            --badge-jpn: rgba(168, 85, 247, 0.15);
            --badge-jpn-text: #c084fc;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: radial-gradient(circle at top left, var(--bg-grad-2) 0%, var(--bg-grad-1) 50%, var(--bg-base) 100%);
            color: var(--text-main);
            margin: 0;
            padding: 24px 32px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(251, 191, 36, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0);
            }
        }

        .animate-enter {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            animation-delay: 0.1s;
            position: relative;
            z-index: 5000;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .today-date {
            margin-left: 16px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-sub);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        h1::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(to bottom, var(--accent-gold), #d97706);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        /* Toggles & Buttons */
        .currency-toggle {
            display: flex;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 4px;
            position: relative;
            cursor: pointer;
            width: 88px;
            height: 36px;
            box-sizing: border-box;
        }

        .currency-option {
            flex: 1;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            z-index: 2;
            transition: color 0.3s ease;
            user-select: none;
        }

        .currency-option.active {
            color: #fff;
        }

        .currency-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: calc(50% - 3px);
            height: calc(100% - 6px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .currency-toggle.krw-mode .currency-slider {
            transform: translateX(100%);
        }

        .btn-sync {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-hover) 100%);
            color: #000;
            border: none;
            padding: 0 24px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
        }

        .btn-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(251, 191, 36, 0.3);
        }

        .btn-sync:active {
            transform: translateY(0);
        }

        .btn-sync svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0 16px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }

        .layout-mode-switch {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 4px;
            height: 40px;
        }

        #searchWrapper {
            position: relative;
            z-index: 3000;
        }

        #searchDropdown {
            z-index: 4000 !important;
        }

        .layout-mode-btn {
            height: 30px;
            border: none;
            border-radius: 8px;
            padding: 0 10px;
            background: transparent;
            color: var(--text-sub);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .layout-mode-btn.active {
            background: rgba(251, 191, 36, 0.15);
            color: var(--accent-gold);
            box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.3);
        }

        .layout-grid {
            display: grid;
            grid-template-columns: minmax(340px, 10fr) minmax(660px, 19fr);
            gap: 24px;
            flex: 1;
            min-height: 0;
            padding-bottom: 24px;
        }

        .right-pane {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(280px, 7fr) minmax(380px, 12fr);
            gap: 24px;
            overflow: hidden;
        }

        .col-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .col-left {
            overflow: hidden;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Top Summaries */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            animation-delay: 0.2s;
        }

        .summary-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gold), transparent);
            opacity: 0.5;
        }

        .summary-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-value {
            font-size: 26px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .summary-sub {
            font-size: 14px;
            font-weight: 500;
            margin-top: 4px;
        }

        /* Middle: Chart Area */
        .chart-area {
            display: flex;
            flex-direction: row;
            /* Changed to row for side-by-side */
            gap: 20px;
            align-items: center;
            /* Center items vertically */
            flex-shrink: 0;
            animation-delay: 0.3s;
        }

        .chart-container {
            flex: 1;
            /* Allow chart to take remaining space */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 180px;
        }

        /* Chart Center Text via CSS overlay */
        .chart-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .chart-center-title {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .chart-center-val {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .allocation-list {
            flex: 1;
            /* Give list equal space or adjust width as needed */
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .alloc-item {
            display: flex;
            justify-content: space-between;
            /* Space out name and percent */
            align-items: center;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .alloc-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alloc-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .alloc-name {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alloc-percent {
            font-size: 12px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            align-self: flex-end;
        }

        /* Bottom: Table */
        .table-container {
            flex: 1;
            padding: 0;
            /* Override */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation-delay: 0.4s;
        }

        .table-header {
            padding: 20px 24px;
            font-weight: 600;
            font-size: 16px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-wrapper {
            flex: 1;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            position: sticky;
            top: 0;
            background: rgba(18, 20, 29, 0.95);
            backdrop-filter: blur(8px);
            color: var(--text-sub);
            font-size: 12px;
            font-weight: 500;
            text-align: right;
            padding: 16px 24px;
            z-index: 10;
        }

        th::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            background: var(--panel-border);
        }

        th:nth-child(1),
        th:nth-child(2) {
            text-align: left;
        }

        td {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
            font-weight: 500;
            text-align: right;
            font-variant-numeric: tabular-nums;
            transition: all 0.2s ease;
        }

        td:nth-child(1),
        td:nth-child(2) {
            text-align: left;
        }

        tr:hover td {
            background-color: var(--panel-hover);
        }

        /* Indices Widget (Left half of bottom) */
        .indices-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
            /* Prevents flex flex-grow overflowing */
        }

        .indices-header {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            padding: 0 4px;
        }

        .indices-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .indices-widget-frame {
            flex: 1;
            min-height: 0;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        /* Calendar Widget (Right half of bottom) */
        .calendar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }

        .calendar-header {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            padding: 0 4px;
        }

        .calendar-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }

        .cal-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cal-item:last-child {
            border-bottom: none;
        }

        .cal-date {
            font-size: 12px;
            color: var(--accent-gold);
            font-weight: 600;
            white-space: nowrap;
        }

        .cal-desc {
            font-size: 13px;
            color: var(--text-sub);
            line-height: 1.4;
        }

        /* --- Insight Section Styling --- */
        .insight-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px var(--panel-shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .insight-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .insight-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            padding-right: 4px;
        }

        /* Ensure the right column takes full height, making Insight Section stretch */
        .col-right {
            height: 100%;
        }

        .is-hidden {
            display: none !important;
        }

        .layout-mode-2 .layout-grid {
            grid-template-columns: minmax(360px, 1fr) minmax(360px, 1fr);
        }

        .layout-mode-1 .layout-grid {
            grid-template-columns: minmax(340px, 10fr) minmax(280px, 7fr) minmax(380px, 12fr);
        }

        .layout-mode-1 .right-pane {
            display: contents;
        }

        .layout-mode-1 .right-widgets-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .layout-mode-1 .bottom-widgets {
            display: flex;
            flex-direction: row;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .layout-mode-1 .indices-section,
        .layout-mode-1 .calendar-section {
            flex: 1;
            min-width: 0;
        }

        .layout-mode-2 .right-pane {
            display: block;
        }

        .layout-mode-2 .col-left,
        .layout-mode-2 .right-widgets-stack,
        .layout-mode-2 .right-insight-panel {
            height: 100%;
            min-height: 0;
        }

        .layout-mode-2 .right-widgets-stack {
            display: grid;
            grid-template-columns: minmax(260px, 0.88fr) minmax(320px, 1.12fr);
            grid-template-rows: 24% 76%;
            gap: 16px;
            align-content: stretch;
            overflow: hidden;
        }

        .layout-mode-2 .right-widgets-stack .chart-area {
            grid-column: 1;
            grid-row: 1;
            min-height: 0;
            height: 100%;
            padding: 10px 12px;
            gap: 10px;
            align-items: stretch;
            justify-content: space-between;
            overflow: hidden;
            border-radius: 16px;
        }

        .layout-mode-2 .right-widgets-stack .chart-container {
            flex: 0 0 auto;
            height: 100%;
            aspect-ratio: 1 / 1;
            min-width: 96px;
            max-width: 132px;
            align-self: center;
        }

        .layout-mode-2 .right-widgets-stack .allocation-list {
            flex: 1 1 auto;
            max-height: none;
            min-height: 0;
            min-width: 0;
            padding-right: 2px;
        }

        .layout-mode-2 .right-widgets-stack .chart-center-title {
            font-size: 11px;
            margin-bottom: 2px;
        }

        .layout-mode-2 .right-widgets-stack .chart-center-val {
            font-size: 15px;
        }

        .layout-mode-2 .right-widgets-stack .alloc-item {
            padding: 7px 9px;
        }

        .layout-mode-2 .right-widgets-stack .alloc-name,
        .layout-mode-2 .right-widgets-stack .alloc-percent {
            font-size: 11px;
        }

        .layout-mode-2 .right-widgets-stack .indices-section {
            grid-column: 1;
            grid-row: 2;
            min-height: 0;
            height: 92%;
            align-self: end;
            padding: 0;
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            overflow: hidden;
            border-radius: 12px;
        }

        .layout-mode-2 .indices-widget-frame {
            border: none;
        }

        .layout-mode-2 .bottom-widgets {
            display: contents;
        }

        .layout-mode-2 .right-widgets-stack .indices-widget-frame {
            height: 100%;
            max-height: 100%;
        }

        .layout-mode-2 .right-widgets-stack .indices-section .tradingview-widget-container,
        .layout-mode-2 .right-widgets-stack .indices-section .tradingview-widget-container__widget {
            height: 100% !important;
            max-height: 100%;
            overflow: hidden;
        }

        .layout-mode-2 .calendar-section {
            grid-column: 2;
            grid-row: 1 / span 2;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .layout-mode-2 .calendar-card {
            min-height: 0;
        }

        .layout-mode-2 .right-insight-panel .insight-section {
            height: 100%;
        }

        .insight-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .insight-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .insight-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .insight-ticker {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .insight-price {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
        }

        /* Financial Grid */
        .fin-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .fin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .fin-card span:nth-child(1) {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .fin-card span:nth-child(2) {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        /* Options Alert */
        .options-alert {
            background: rgba(251, 191, 36, 0.1);
            border-left: 3px solid var(--accent-gold);
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Chart Container */
        .tv-wrapper {
            width: 100%;
            height: 416px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 4px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }

        /* News List */
        .news-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 8px;
            margin-top: 8px;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-item {
            display: flex;
            flex-direction: column;

        const LAYOUT_STORAGE_KEY = 'dashboard_layout_mode';

        // 프리미엄 색상 팔레트
        const chartColors = [
            '#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e',
            '#f97316', '#fbbf24', '#10b981', '#14b8a6', '#0ea5e9'
        ];

        // 숫자 포맷
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // 수익률 포맷 및 배지 생성
        function formatProfit(val, isBadge = false) {
            const num = parseFloat(val);
            const formatted = Math.abs(num).toFixed(2) + '%';
            if (num > 0) {
                return isBadge
                    ? `<span class="profit-badge bg-plus">+${formatted}</span>`
                    : `<span class="profit-plus">+${formatted}</span>`;
            }
            if (num < 0) {
                return isBadge
                    ? `<span class="profit-badge bg-minus">-${formatted}</span>`
                    : `<span class="profit-minus">-${formatted}</span>`;
            }
            return isBadge
                ? `<span class="profit-badge" style="background: rgba(255,255,255,0.1); color: #fff;">0.00%</span>`
                : `<span style="color: var(--text-sub);">0.00%</span>`;
        }

        function normalizeTicker(value) {
            const normalized = (value || '').toString().trim().toUpperCase();
            if (normalized.length >= 6 && /^[A-Z]*\d{6}$/.test(normalized)) {
                return normalized.slice(-6);
            }
            return normalized;
        }

        function calcHoldingProfitRate(nowPrice, avgPrice) {
            const parseNum = (v) => {
                if (typeof v === 'number') return v;
                const cleaned = (v ?? '').toString().replace(/[^0-9.\-]/g, '');
                return Number(cleaned);
            };
            const avg = parseNum(avgPrice);
            const now = parseNum(nowPrice);
            if (!isFinite(avg) || avg <= 0 || !isFinite(now)) return null;
            return ((now - avg) / avg) * 100;
        }

        function updateLayoutModeUI() {
            const btnMode1 = document.getElementById('layoutModeBtn1');
            const btnMode2 = document.getElementById('layoutModeBtn2');
            if (!btnMode1 || !btnMode2) return;

            btnMode1.classList.toggle('active', currentLayoutMode === 'mode1');
            btnMode2.classList.toggle('active', currentLayoutMode === 'mode2');
        }

            rightPaneState = state === 'insight' ? 'insight' : 'widgets';
            const widgetsPane = document.getElementById('rightWidgetsStack');
            const insightPane = document.getElementById('rightInsightPanel');
            if (!widgetsPane || !insightPane) return;

            if (currentLayoutMode === 'mode1') {
                widgetsPane.classList.remove('is-hidden');
                insightPane.classList.remove('is-hidden');

                let totalValLocal = item.now_price * item.qty; // For local currency display

                    if (currentCurrencyMode === 'krw') {

                        displayNow = item.now_price * exrt;
                        totalValLocal = item.now_price * item.qty * exrt;

        // 메인 데이터 동기화 함수
        async function syncData() {
            const loading = document.getElementById('loading');
            loading.classList.add('active');

            try {
                const res = await fetch('/api/sync');

                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                const data = await res.json();

                if (data.status === "success") {
                    const krCash = data?.domestic?.summary?.cash_balance || 0;
                    const usCash = data?.overseas?.us_summary?.usd_cash_balance || 0;
                    let exrt = 1350;
                    if (data?.overseas?.us_items && data.overseas.us_items.length > 0) {
                        exrt = data.overseas.us_items[0].bass_exrt || 1350;
                    }
                    cachedKrCash = krCash;
                    cachedUsdCash = usCash;
                    cachedExrt = exrt;
                    const totalCashKrw = krCash + (usCash * exrt);

                    document.getElementById('val_total_cash').innerText = `₩${formatNumber(Math.round(totalCashKrw))}`;
                    document.getElementById('val_krw_cash').innerText = `₩${formatNumber(Math.round(krCash))}`;
                    document.getElementById('val_usd_cash').innerText = `$${formatNumber(usCash.toFixed(2))}`;
                    const now = new Date();
                    const hh = String(now.getHours()).padStart(2, '0');
                    const mm = String(now.getMinutes()).padStart(2, '0');
                    const ss = String(now.getSeconds()).padStart(2, '0');
                    const lastSync = document.getElementById('last-sync-text');
                    if (lastSync) lastSync.innerText = `마지막 동기화: ${hh}:${mm}:${ss}`;

                    // 리스트 취합 및 원화 평가/매입금액 계산
                    let combinedItems = [];

                    const domesticItems = Array.isArray(data?.domestic?.items) ? data.domestic.items : [];
                    const usItems = Array.isArray(data?.overseas?.us_items) ? data.overseas.us_items : [];
                    const jpItems = Array.isArray(data?.overseas?.jp_items) ? data.overseas.jp_items : [];

                    domesticItems.forEach(i => {
                        const evalAmt = i.qty * i.now_price;
                        const purchaseAmt = i.qty * i.avg_price;
                        const holdingRt = calcHoldingProfitRate(i.now_price, i.avg_price);
                        combinedItems.push({ ...i, type: 'KOR', evalAmtKrw: evalAmt, purchaseAmtKrw: purchaseAmt, profit_rt: holdingRt ?? 0 });
                    });

                    usItems.forEach(i => {
                        let exrt = i.bass_exrt || 1350;
                        const evalAmt = i.qty * i.now_price * exrt;
                        const purchaseAmt = i.qty * i.avg_price * exrt;
                        const holdingRt = calcHoldingProfitRate(i.now_price, i.avg_price);
                        combinedItems.push({ ...i, type: 'USA', evalAmtKrw: evalAmt, purchaseAmtKrw: purchaseAmt, profit_rt: holdingRt ?? 0 });
                    });

                    jpItems.forEach(i => {
                        let exrt = i.bass_exrt || 905;
                        const evalAmt = i.qty * i.now_price * (exrt / 100);
                        const purchaseAmt = i.qty * i.avg_price * (exrt / 100);
                        const holdingRt = calcHoldingProfitRate(i.now_price, i.avg_price);
                        combinedItems.push({ ...i, type: 'JPN', evalAmtKrw: evalAmt, purchaseAmtKrw: purchaseAmt, profit_rt: holdingRt ?? 0 });
                    });

                    // 요약 수치도 종목 합산 기준으로 통일
                    const totalEvalKrw = combinedItems.reduce((acc, item) => acc + (item.evalAmtKrw || 0), 0);
                    const totalPurchaseKrw = combinedItems.reduce((acc, item) => acc + (item.purchaseAmtKrw || 0), 0);
                    const totalProfitAmt = totalEvalKrw - totalPurchaseKrw;
                    const totalProfitRt = totalPurchaseKrw > 0 ? (totalProfitAmt / totalPurchaseKrw) * 100 : 0;

                    // 요약 카드 업데이트
                    document.getElementById('val_total_assets').innerText = `₩${formatNumber(Math.round(totalEvalKrw))}`;
                    document.getElementById('val_purchase').innerText = `₩${formatNumber(Math.round(totalPurchaseKrw))}`;

                    const profitSign = totalProfitAmt > 0 ? '+' : '';
                    const profitClass = totalProfitAmt > 0 ? 'profit-plus' : (totalProfitAmt < 0 ? 'profit-minus' : '');

                    const profitElem = document.getElementById('val_total_profit');
                    profitElem.innerText = `${profitSign}₩${formatNumber(Math.round(Math.abs(totalProfitAmt)))}`;
                    profitElem.className = `summary-value ${profitClass}`;

                    document.getElementById('val_total_rt').innerHTML = formatProfit(totalProfitRt, true);

                    // 평가금액 기준 내림차순 정렬
                    combinedItems.sort((a, b) => b.evalAmtKrw - a.evalAmtKrw);
                    cachedItems = combinedItems;

                    // 렌더링 호출
                    renderTable();
                    updateChart(combinedItems, totalEvalKrw);

                    // Static mode only.
                }
            } catch (err) {
                console.error(err);
                alert("데이터를 불러오는 중 오류가 발생했습니다.");
            } finally {
                loading.classList.remove('active');
            }
        }

        // SSE (Server-Sent Events) 실시간 가격 수신
        let evtSource = null;

        function initRealtime() {
            if (evtSource) {
                evtSource.close();
            }

            evtSource = new EventSource('/api/realtime-prices');
            const statusDot = document.getElementById('ws-status-dot');
            const statusText = document.getElementById('ws-status-text');

            evtSource.onmessage = function (e) {
                // keepalive 체크
                if (e.data.trim() === 'keepalive' || e.data.trim() === '') return;

                try {
                    const data = JSON.parse(e.data);

                    // 상태 업데이트
                    if (data.type === 'status') {
                        if (data.status === 'connected') {
                            statusDot.style.background = 'var(--profit)';
                            statusText.innerText = '실시간 스트리밍 중';
                        } else if (data.status === 'reconnecting') {
                            statusDot.style.background = 'var(--accent-gold)';
                            statusText.innerText = '재연결 시도 중...';
                        } else {
                            statusDot.style.background = 'var(--loss)';
                            statusText.innerText = '웹소켓 오프라인';
                        }
                        return;
                    }

                    // 가격 업데이트
                    if (data.type === 'price') {
                        let updated = false;
                        let totalEvalKrw = 0;
                        let totalPurchaseKrw = 0;
                        const incomingTicker = normalizeTicker(data.ticker);
                        const fallbackTicker = normalizeTicker(data.raw_symbol);
                        const changedTickers = new Set();

                        // 기존 cachedItems에 가격 반영
                        cachedItems.forEach(item => {
                            const itemTicker = normalizeTicker(item.ticker);
                            const isMatch = itemTicker === incomingTicker || (fallbackTicker && itemTicker === fallbackTicker);
                            if (isMatch) {
                                item.now_price = data.price;

                                // 평가금액 재계산
                                let exrt = 1;
                                if (item.type === 'USA') exrt = item.bass_exrt || 1350;
                                else if (item.type === 'JPN') exrt = (item.bass_exrt || 905) / 100;

                                item.evalAmtKrw = item.qty * item.now_price * exrt;
                                // 수익률 재계산 (국내 기준, 해주는 좋겠지만 일단 가격만 변동)
                                const holdingProfitRt = calcHoldingProfitRate(item.now_price, item.avg_price);
                                item.profit_rt = holdingProfitRt ?? 0;
                                updated = true;
                                changedTickers.add(itemTicker);
                            }

                            totalEvalKrw += item.evalAmtKrw;

                            let exrt = 1;
                            if (item.type === 'USA') exrt = item.bass_exrt || 1350;
                            else if (item.type === 'JPN') exrt = (item.bass_exrt || 905) / 100;
                            totalPurchaseKrw += (item.qty * item.avg_price) * exrt;
                        });

                        // 업데이트된 항목이 있다면 화면 휨 갱신
                        if (updated) {
                            updateRealtimeRows(changedTickers);
                            updateChart(cachedItems, totalEvalKrw);

                            // 요약 카드 업데이트
                            document.getElementById('val_total_assets').innerText = `₩${formatNumber(Math.round(totalEvalKrw))}`;

                            const totalProfitAmt = totalEvalKrw - totalPurchaseKrw;
                            const totalProfitRt = totalPurchaseKrw > 0 ? (totalProfitAmt / totalPurchaseKrw) * 100 : 0;

                            const profitSign = totalProfitAmt > 0 ? '+' : '';
                            const profitClass = totalProfitAmt > 0 ? 'profit-plus' : (totalProfitAmt < 0 ? 'profit-minus' : '');

                            const profitElem = document.getElementById('val_total_profit');
                            profitElem.innerText = `${profitSign}₩${formatNumber(Math.round(Math.abs(totalProfitAmt)))}`;
                            profitElem.className = `summary-value ${profitClass}`;
                            document.getElementById('val_total_rt').innerHTML = formatProfit(totalProfitRt, true);
                        }
                    }
                } catch (err) {
                    console.error('SSE Error processing msg:', err);
                }
            };

            evtSource.onerror = function (err) {
                console.error("EventSource failed:", err);
                statusDot.style.background = 'var(--loss)';
                statusText.innerText = '서버 연결 대기';
            };
        }

        // ========== 종목 검색 ==========

        async function searchStock(query) {

            const dropdown = document.getElementById('searchDropdown');
            if (!query || query.length < 1) {
                lastSearchResults = [];
                dropdown.style.display = 'none';
                return;
            }
            searchTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/stock-search?q=${encodeURIComponent(query)}`);
                    const result = await res.json();
                    if (result.status === 'success' && result.data.length > 0) {
                        lastSearchResults = result.data;
                        let html = '';
                        result.data.forEach(item => {
                            const mktBadge = item.market === 'KOR' ? '🇰🇷' : (item.market === 'JPN' ? '🇯🇵' : '🇺🇸');
                            const safeTicker = encodeURIComponent(item.ticker || '');
                            const safeMarket = item.market || 'USA';
                            html += `<div data-ticker="${safeTicker}" data-market="${safeMarket}" onclick="selectSearchResult(decodeURIComponent(this.dataset.ticker), this.dataset.market)"
                                style="padding:10px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.15s;"
                                onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">

                                    <div style="font-size:13px; font-weight:600; color:#fff;">${item.name}</div>
                                    <div style="font-size:11px; color:var(--text-muted);">${item.ticker}</div>
                                </div>
                                <span style="font-size:14px;">${mktBadge}</span>
                            </div>`;
                        });
                        dropdown.innerHTML = html;
                        dropdown.style.display = 'block';
                    } else {
                        lastSearchResults = [];
                        dropdown.innerHTML = '<div style="padding:14px; text-align:center; color:var(--text-muted); font-size:13px;">검색 결과 없음</div>';

        function handleSearchKeydown(event) {
            if (event.key !== 'Enter') return;
            const dropdown = document.getElementById('searchDropdown');
            const firstItem = dropdown.querySelector('[data-ticker][data-market]');
            if (firstItem) {
                event.preventDefault();
                selectSearchResult(decodeURIComponent(firstItem.dataset.ticker), firstItem.dataset.market);
                return;
            }
            if (lastSearchResults.length > 0) {
                event.preventDefault();
                const top = lastSearchResults[0];

        async function fetchMarketCalendar() {

                    const listContainer = document.getElementById('calendar_list');

                            details = `<div style = "color: var(--text-muted); font-size: 12px; margin-top: 4px;" > `;

                            details += `예측: <span style="color:#fff;">${item.forecast && item.forecast !== 'None' ? item.forecast : 'None'}</span> <span style="margin:0 4px; color:rgba(255,255,255,0.2);">/</span> `;

                            details += `예측: <span style="color:#fff;">None</span> <span style="margin:0 4px; color:rgba(255,255,255,0.2);">/</span> `;
                            details += `이전: <span style="color:#fff;">None</span>`;
                            details += `</div> `;

                                    오늘 예정된 주요 일정이 없습니다.
                        </div>
                                `;
                }
            } catch (error) {
                console.error('Failed to fetch market calendar', error);
                document.getElementById('calendar_list').innerHTML = `

                                    캘린더 데이터를 불러오는데 실패했습니다.
                    </div>

        async function fetchAssetInsight(ticker, marketType) {

                        const putPct = total > 0 ? 100 - callPct : 50;
                        const pcrRaw = opt.pcr;
                        const pcr = Number.isFinite(pcrRaw) ? Number(pcrRaw).toFixed(2) : (pcrRaw === 'High' ? 'High' : 'N/A');

                                        <span style="font-size:11px; color:var(--text-muted);">PCR(${pcrBasis}) ${pcr}</span>

                                        <div style="font-size:13px; font-weight:700; color:#eab308;">${opt.max_pain ? strikePrefix + formatNumber(opt.max_pain) : 'N/A'}</div>

                                        <div style="font-size:11px; color:var(--text-muted);">${maxCallLabel}</div>

                                    </div>
                                    <div style="display:flex; justify-content:space-between; align-items:center;">
                                        <div style="font-size:11px; color:var(--text-muted);">${maxPutLabel}</div>
                                        <div style="font-size:13px; font-weight:700; color:var(--loss);">${opt.max_put_oi_strike ? strikePrefix + formatNumber(opt.max_put_oi_strike) : 'N/A'}</div>

                    } else {

                    html += `

                    } else {

                            const chart = LightweightCharts.createChart(tvContainer, {

                            })));

                            chart.timeScale().fitContent();
                            // Resize handler

                                chart.applyOptions({ width: tvContainer.clientWidth });

                            resizeObserver.observe(tvContainer);
                        } else {

                    <div style="color:var(--loss); text-align:center; padding:20px;">
                        정보를 불러오는 데 실패했습니다.

        }

        let modalConfirmAction = null;

        function showModal(opts) {
            const overlay = document.getElementById('customModal');
            document.getElementById('modalTitle').innerText = opts.title;
            document.getElementById('modalDesc').innerText = opts.desc;

            const iconEl = document.getElementById('modalIcon');
            iconEl.innerHTML = opts.iconHtml;
            if (opts.isDanger) {
                iconEl.classList.add('warning');
            } else {
                iconEl.classList.remove('warning');
            }

            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.innerText = opts.confirmText || '확인';
            confirmBtn.className = 'btn-modal ' + (opts.isDanger ? 'btn-danger' : 'btn-confirm');

            modalConfirmAction = opts.onConfirm;
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('customModal').classList.remove('active');
            modalConfirmAction = null;
        }

        function executeModalConfirm() {
            if (modalConfirmAction) {
                modalConfirmAction();
            }
            closeModal();
        }

        function lockScreen() {
            showModal({
                title: '화면 잠금',
                desc: '화면을 잠그시겠습니까?\n잠금 해제를 위해 간편비밀번호를 다시 입력해야 합니다.',
                confirmText: '잠금',
                isDanger: false,
                iconHtml: `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`,
                onConfirm: async () => {
                    try {
                        sessionStorage.removeItem("dashboard_auth");
                        await fetch('/api/logout', { method: 'POST' });
                        window.location.href = '/login';
                    } catch (err) {
                        console.error("Lock error", err);
                    }
                }
            });
        }

        function logoutAndReset() {
            showModal({
                title: '로그아웃 및 설정 초기화',
                desc: '정말 로그아웃 하시겠습니까?\n등록된 한국투자증권 API 정보와 간편비밀번호가 기기에서 완전히 삭제되며 처음부터 다시 설정해야 합니다.',
                confirmText: '초기화 및 로그아웃',
                isDanger: true,
                iconHtml: `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>`,
                onConfirm: async () => {
                    try {
                        sessionStorage.removeItem("dashboard_auth");
                        await fetch('/api/reset', { method: 'POST' });
                        window.location.href = '/login';
                    } catch (err) {
                        console.error("Reset error", err);
                    }
                }
            });
        }

        // 앱 초기화
        window.addEventListener('DOMContentLoaded', async () => {
            if (!sessionStorage.getItem("dashboard_auth")) {
                try { await fetch('/api/logout', { method: 'POST' }); } catch (err) { }
                window.location.href = '/login';
                return;
            }

            const savedLayoutMode = localStorage.getItem(LAYOUT_STORAGE_KEY) || 'mode2';
            applyLayoutMode(savedLayoutMode, false);
            setRightPaneState('widgets');

            // Set today's date
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const dayOfWeek = days[today.getDay()];

            document.getElementById('today_date').innerText = `${year}년 ${month}월 ${day}일 (${dayOfWeek})`;

            fetchMarketCalendar();
            syncData();
        });
    </script>

    <!-- Custom Modals -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon"></div>
            <div class="modal-title" id="modalTitle">알림</div>
            <div class="modal-desc" id="modalDesc">내용이 여기에 표시됩니다.</div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn-modal" id="modalConfirmBtn" onclick="executeModalConfirm()">확인</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div
        style="position: fixed; bottom: 12px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 11px; z-index: 9999; pointer-events: none;">
        © Youngin all rights reserved.
    </div>


</body>

</html>
