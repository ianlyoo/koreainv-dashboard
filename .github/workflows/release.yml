name: Build And Release
run-name: ${{ github.event_name == 'push' && format('Release {0}', github.ref_name) || 'Build And Release (manual)' }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_policy:
        description: "Update policy for the release"
        required: false
        default: "recommended"
        type: choice
        options:
          - recommended
          - mandatory

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          app_version="$(python -c 'from app.version import APP_VERSION; print(APP_VERSION)')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$app_version" ]; then
            echo "Tag version ($tag_version) does not match APP_VERSION ($app_version)." >&2
            exit 1
          fi

      - name: Build Windows distribution
        shell: cmd
        run: build_windows.bat

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KISDashboard-win64
          path: dist/KISDashboard-win64.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          app_version="$(python -c 'from app.version import APP_VERSION; print(APP_VERSION)')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$app_version" ]; then
            echo "Tag version ($tag_version) does not match APP_VERSION ($app_version)." >&2
            exit 1
          fi

      - name: Build macOS distribution
        run: ./scripts/build_mac_app.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KISDashboard-mac
          path: dist/KISDashboard-mac-*.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release policy
        id: policy
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_POLICY: ${{ github.event.inputs.release_policy }}
        run: |
          policy="${INPUT_POLICY:-}"
          if [ -z "$policy" ]; then
            ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")"
            object_type="$(printf '%s' "$ref_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["type"])')"
            if [ "$object_type" = "tag" ]; then
              object_url="$(printf '%s' "$ref_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["object"]["url"])')"
              tag_message="$(gh api "$object_url" --jq '.message')"
            else
              tag_message=""
            fi
            compact="$(printf '%s' "$tag_message" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
            if printf '%s' "$compact" | grep -q '\[mandatory-update\]\|mandatory-update\|update_policy:mandatory\|필수업데이트'; then
              policy="mandatory"
            else
              policy="recommended"
            fi
          fi
          echo "policy=$policy" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.zip
          generate_release_notes: true

      - name: Mark mandatory update in release body
        if: steps.policy.outputs.policy == 'mandatory'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(gh release view "${GITHUB_REF_NAME}" --json body --jq '.body')"
          case "$body" in
            *"[mandatory-update]"*) exit 0 ;;
          esac
          new_body=$'[mandatory-update]\n필수 업데이트\n\n'"$body"
          gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME} - 필수 업데이트" --notes "$new_body"
